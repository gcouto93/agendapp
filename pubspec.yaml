name: agenda_ja_app
description: A new Flutter project.
publish_to:

version: 1.0.0+1

environment:
  sdk: '>=3.0.6 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  firebase_core: ^3.15.1
  provider: ^6.1.1
  navigator: ^1.1.1
  firebase_auth: ^5.6.2
  firebase_storage: ^12.4.5
  image_picker: ^1.0.4
  firebase_database: ^11.3.5
  flutter_modular: ^6.3.4
  mobx: ^2.5.0
  flutter_mobx: ^2.3.0
  asuka: ^2.2.1
  dio: ^5.8.0+1
  flutter_screenutil: ^5.9.3
  flutter_dotenv: ^5.2.1
  firebase_remote_config: ^5.4.7
  firebase_analytics: ^11.5.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  mobx_codegen: ^2.7.0
  build_runner: ^2.4.15


  flutter_lints: ^2.0.0

flutter:

  uses-material-design: true

  assets:
    - assets/images/
    - .env

  fonts:
    - family: AgendaapIcons
      fonts:
        - asset: assets/fonts/AgendaapIcons.ttf

